name: Backup Supabase DMS (semanal)

on:
  schedule:
    # Domingo 03:07 UTC (00:07 BRT) — off-peak, evita choque de load
    - cron: '7 3 * * 0'
  workflow_dispatch:
    inputs:
      force:
        description: 'Forçar backup fora da janela semanal'
        required: false
        default: 'false'

permissions:
  contents: write        # precisa escrever no repo pra commitar os backups

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Rodar backup
        env:
          SUPABASE_PAT: ${{ secrets.SUPABASE_PAT }}
          PROJECT_REF:  ${{ secrets.PROJECT_REF }}
          BACKUP_DIR:   backups
        run: |
          python scripts/backup/backup-supabase.py

      - name: Rotaciona backups (mantém últimas 12 semanas)
        run: |
          cd backups
          # Lista todas as pastas YYYY-MM-DD e remove tudo além das 12 mais recentes
          ls -d */ 2>/dev/null | sort -r | tail -n +13 | xargs -r rm -rf
          ls -la

      - name: Commit & push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backups/
          if git diff --staged --quiet; then
            echo "Nenhuma mudança — sem commit"
            exit 0
          fi
          git commit -m "🔄 Backup automático $(date -u +%Y-%m-%d)"
          git push

      - name: Resumo
        if: always()
        run: |
          echo "## 📦 Backup Supabase DMS" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d backups ]; then
            echo "### Pastas preservadas:" >> $GITHUB_STEP_SUMMARY
            ls -d backups/*/ 2>/dev/null | sed 's|backups/||' | sed 's|/||' | sed 's/^/- /' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Total do backup mais recente:" >> $GITHUB_STEP_SUMMARY
            LATEST=$(ls -d backups/*/ 2>/dev/null | sort | tail -1)
            if [ -n "$LATEST" ]; then
              du -sh "$LATEST" >> $GITHUB_STEP_SUMMARY
            fi
          fi
